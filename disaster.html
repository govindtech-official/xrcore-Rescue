<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Disaster Rescue Scene</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    body { margin: 0; }
  </style>
</head>

<body>
  <a-scene>
    <!-- Lighting -->
    <a-light type="ambient" color="white" intensity="0.7"></a-light>
    <a-light type="directional" color="orange" intensity="0.8" position="5 10 5"></a-light>

    <!-- Sky - Dark due to disaster -->
    <a-sky color="#4a4a4a"></a-sky>

    <!-- Ground/Terrain -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#8B7355"></a-plane>

    <!-- Water/Flood effect -->
    <a-plane position="0 0.3 -10" rotation="-90 0 0" width="20" height="15" color="#1E90FF" opacity="0.6"></a-plane>

    <!-- Collapsed Building 1 - Rubble pile -->
    <a-box position="-5 0.5 0" width="4" height="1" depth="4" color="#A9A9A9"></a-box>
    <a-box position="-6 1.2 -1" width="2" height="1.5" depth="2" color="#808080" rotation="20 15 10"></a-box>
    <a-box position="-4 1.3 1" width="2.5" height="1.2" depth="2.5" color="#696969" rotation="-15 20 -10"></a-box>
    <a-box position="-5.5 2 0.5" width="1.5" height="0.8" depth="1.5" color="#778899" rotation="30 -20 15"></a-box>

    <!-- Collapsed Building 2 -->
    <a-box position="6 0.4 -3" width="5" height="0.8" depth="3" color="#A9A9A9"></a-box>
    <a-box position="7 1.5 -2" width="2" height="2" depth="1.5" color="#808080" rotation="25 -15 20"></a-box>
    <a-box position="5 1.3 -4" width="2.5" height="1.5" depth="2" color="#696969" rotation="-20 25 -15"></a-box>

    <!-- Fire/Emergency indicators - Orange cylinders -->
    <a-cylinder position="-5 1.5 0" radius="0.3" height="1" color="#FF4500"></a-cylinder>
    <a-cylinder position="-6.5 1.2 -0.5" radius="0.25" height="0.8" color="#FF6347"></a-cylinder>
    <a-cylinder position="6.5 1.5 -3" radius="0.3" height="1" color="#FF4500"></a-cylinder>

    <!-- Trapped People - Red spheres on rubble -->
    <a-sphere position="-5 2 -0.5" radius="0.3" color="#FF0000"></a-sphere>
    <a-text value="HELP!" position="-5 2.7 -0.5" align="center" color="red" font="mozillavr" width="1.5" height="0.5" anchor="center"></a-text>

    <a-sphere position="-4.2 2.2 1.2" radius="0.3" color="#FF0000"></a-sphere>
    <a-text value="SOS" position="-4.2 2.9 1.2" align="center" color="red" font="mozillavr" width="1.5" height="0.5" anchor="center"></a-text>

    <a-sphere position="6 2 -3.5" radius="0.3" color="#FF0000"></a-sphere>
    <a-text value="RESCUE!" position="6 2.7 -3.5" align="center" color="red" font="mozillavr" width="1.5" height="0.5" anchor="center"></a-text>

    <!-- Helicopter 1 - Moving across scene -->
    <a-entity position="0 5 8" animation="property: position; from: 0 5 8; to: 0 5 -15; dur: 8000; easing: linear; loop: true;">
      <!-- Fuselage -->
      <a-box position="0 0 0" width="1.5" height="1" depth="3" color="#FF6B6B"></a-box>
      <!-- Cockpit -->
      <a-sphere position="0 0.6 1" radius="0.4" color="#87CEEB"></a-sphere>
      <!-- Tail -->
      <a-box position="0 0 -1.2" width="0.3" height="0.3" depth="0.8" color="#FF6B6B"></a-box>
      <!-- Main rotor (spinning) -->
      <a-entity position="0 1.2 0" animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 500; easing: linear; loop: true;">
        <a-cylinder position="0 0 0" radius="1.5" height="0.05" color="#333"></a-cylinder>
        <a-box position="-1.5 0 0" width="3" height="0.05" depth="0.2" color="#444"></a-box>
      </a-entity>
      <!-- Landing gear -->
      <a-box position="-0.6 -0.6 0.5" width="0.1" height="0.8" depth="0.1" color="#000"></a-box>
      <a-box position="0.6 -0.6 0.5" width="0.1" height="0.8" depth="0.1" color="#000"></a-box>
    </a-entity>

    <!-- Helicopter 2 - Moving across scene (offset) -->
    <a-entity position="5 5.5 -5" animation="property: position; from: 5 5.5 -5; to: 5 5.5 12; dur: 10000; easing: linear; loop: true;">
      <!-- Fuselage -->
      <a-box position="0 0 0" width="1.5" height="1" depth="3" color="#4169E1"></a-box>
      <!-- Cockpit -->
      <a-sphere position="0 0.6 1" radius="0.4" color="#87CEEB"></a-sphere>
      <!-- Tail -->
      <a-box position="0 0 -1.2" width="0.3" height="0.3" depth="0.8" color="#4169E1"></a-box>
      <!-- Main rotor (spinning) -->
      <a-entity position="0 1.2 0" animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 500; easing: linear; loop: true;">
        <a-cylinder position="0 0 0" radius="1.5" height="0.05" color="#333"></a-cylinder>
        <a-box position="-1.5 0 0" width="3" height="0.05" depth="0.2" color="#444"></a-box>
      </a-entity>
      <!-- Landing gear -->
      <a-box position="-0.6 -0.6 0.5" width="0.1" height="0.8" depth="0.1" color="#000"></a-box>
      <a-box position="0.6 -0.6 0.5" width="0.1" height="0.8" depth="0.1" color="#000"></a-box>
    </a-entity>

    <!-- Helicopter 3 - Hovering over rescue area -->
    <a-entity position="-5 6 0" animation="property: position; from: -5 6 0; to: -5 6.5 0; dur: 2000; easing: easeInOutQuad; loop: true; dir: alternate;">
      <!-- Fuselage -->
      <a-box position="0 0 0" width="1.5" height="1" depth="3" color="#FFD700"></a-box>
      <!-- Cockpit -->
      <a-sphere position="0 0.6 1" radius="0.4" color="#87CEEB"></a-sphere>
      <!-- Tail -->
      <a-box position="0 0 -1.2" width="0.3" height="0.3" depth="0.8" color="#FFD700"></a-box>
      <!-- Main rotor (spinning) -->
      <a-entity position="0 1.2 0" animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 500; easing: linear; loop: true;">
        <a-cylinder position="0 0 0" radius="1.5" height="0.05" color="#333"></a-cylinder>
        <a-box position="-1.5 0 0" width="3" height="0.05" depth="0.2" color="#444"></a-box>
      </a-entity>
      <!-- Landing gear -->
      <a-box position="-0.6 -0.6 0.5" width="0.1" height="0.8" depth="0.1" color="#000"></a-box>
      <a-box position="0.6 -0.6 0.5" width="0.1" height="0.8" depth="0.1" color="#000"></a-box>
    </a-entity>

    <!-- Rescue rope from hovering helicopter -->
    <a-cylinder position="-5 3 -0.5" radius="0.05" height="2.5" color="#FFD700"></a-cylinder>

    <!-- Emergency vehicles -->
    <a-box position="-12 0.5 5" width="2" height="1.5" depth="4" color="#FF0000"></a-box>
    <a-sphere position="-12 1.2 4.5" radius="0.3" color="#FFD700"></a-sphere>

    <!-- Warning text -->
    <a-text value="DISASTER RESCUE OPERATION" position="0 7 -8" align="center" color="red" font="mozillavr" width="5" height="1" anchor="center"></a-text>

    <!-- Status indicator -->
    <a-text value="3 Helicopters Dispatched - Rescue in Progress" position="0 6.2 -8" align="center" color="yellow" font="mozillavr" width="5" height="0.8" anchor="center"></a-text>

  </a-scene>
</body>

</html>
