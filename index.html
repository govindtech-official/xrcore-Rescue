<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Disaster Building Rescue Scene</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #status { position: absolute; top: 20px; left: 20px; color: #00FF00; font-weight: bold; font-family: Arial; font-size: 14px; text-shadow: 0 0 10px #00FF00; }
    .status-line { margin: 5px 0; }
  </style>
</head>

<body>
  <a-scene>
    <!-- HELICOPTER COCKPIT - User's View (Camera inside helicopter) -->
    <a-camera position="-22 18 -10" look-controls="enabled: true"></a-camera>

    <!-- Lighting -->
    <a-light type="ambient" color="white" intensity="0.8"></a-light>
    <a-light type="directional" color="orange" intensity="0.9" position="15 20 15"></a-light>
    <a-light type="point" color="#FF4500" intensity="1" position="0 15 0"></a-light>

    <!-- Sky - Dark and stormy -->
    <a-sky color="#3a3a4e"></a-sky>

    <!-- Ground (mostly under water) -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="150" height="150" color="#5a5a5a"></a-plane>

    <!-- MASSIVE FLOOD - Covers entire area except small island -->
    <!-- Main flood coverage -->
    <a-plane position="-5 0.15 -10" rotation="-90 0 0" width="140" height="140" color="#1E90FF" opacity="0.75"></a-plane>
    <!-- Additional flood layers for depth -->
    <a-plane position="-5 0.2 -10" rotation="-90 0 0" width="135" height="135" color="#0077BE" opacity="0.5"></a-plane>

    <!-- ==================== BUILDING 1 - OFFICE TOWER (DAMAGED) ==================== -->
    
    <!-- Main structure -->
    <a-box position="-20 12 -10" width="10" height="25" depth="8" color="#808080"></a-box>

    <!-- Broken Windows - Grid pattern -->
    <!-- Floor 1 -->
    <a-box position="-26 2 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-22 2 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-18 2 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-14 2 -10" width="0.8" height="1.2" depth="0.2" color="#FF4500"></a-box> <!-- Broken/on fire -->

    <!-- Floor 2 -->
    <a-box position="-26 5 -10" width="0.8" height="1.2" depth="0.2" color="#FF4500"></a-box> <!-- Fire -->
    <a-box position="-22 5 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-18 5 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-14 5 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>

    <!-- Floor 3 -->
    <a-box position="-26 8 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-22 8 -10" width="0.8" height="1.2" depth="0.2" color="#FF4500"></a-box> <!-- Fire -->
    <a-box position="-18 8 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-14 8 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>

    <!-- Floor 4 -->
    <a-box position="-26 11 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-22 11 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-18 11 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-14 11 -10" width="0.8" height="1.2" depth="0.2" color="#FF4500"></a-box> <!-- Fire -->

    <!-- Floor 5 (Top) -->
    <a-box position="-26 14 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-22 14 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-18 14 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="-14 14 -10" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>

    <!-- ==================== RESCUE SURVIVORS - Running around disaster area ==================== -->
    <!-- Person 1 - Running from Building 1 area -->
    <a-entity position="-30 0.8 -20" 
      animation="property: position; from: -30 0.8 -20; to: -10 0.8 -20; dur: 4000; easing: linear; loop: true;">
      <!-- Head -->
      <a-sphere position="0 0.5 0" radius="0.25" color="#FDBCB4"></a-sphere>
      <!-- Body -->
      <a-cylinder position="0 0 0" radius="0.18" height="0.6" color="#FF6347"></a-cylinder>
      <!-- Left arm (animated running) -->
      <a-cylinder position="-0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 -45; to: 0 0 45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Right arm (animated running) -->
      <a-cylinder position="0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 45; to: 0 0 -45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Left leg -->
      <a-cylinder position="-0.15 -0.45 0" radius="0.1" height="0.6" color="#333333"></a-cylinder>
      <!-- Right leg -->
      <a-cylinder position="0.15 -0.45 0" radius="0.1" height="0.6" color="#333333"></a-cylinder>
    </a-entity>
    <a-text value="HELP!" position="-30 1.8 -20" align="center" color="red" font="mozillavr" width="1" height="0.3" anchor="center" animation="property: position; from: -30 1.8 -20; to: -10 1.8 -20; dur: 4000; easing: linear; loop: true;"></a-text>

    <!-- Person 2 - Running near flooded area -->
    <a-entity position="-15 0.8 -25" 
      animation="property: position; from: -15 0.8 -25; to: 5 0.8 -25; dur: 5000; easing: linear; loop: true; delay: 500;">
      <!-- Head -->
      <a-sphere position="0 0.5 0" radius="0.25" color="#FDBCB4"></a-sphere>
      <!-- Body -->
      <a-cylinder position="0 0 0" radius="0.18" height="0.6" color="#4169E1"></a-cylinder>
      <!-- Left arm (animated running) -->
      <a-cylinder position="-0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 45; to: 0 0 -45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Right arm (animated running) -->
      <a-cylinder position="0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 -45; to: 0 0 45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Left leg -->
      <a-cylinder position="-0.15 -0.45 0" radius="0.1" height="0.6" color="#2F4F5F"></a-cylinder>
      <!-- Right leg -->
      <a-cylinder position="0.15 -0.45 0" radius="0.1" height="0.6" color="#2F4F5F"></a-cylinder>
    </a-entity>

    <!-- Person 3 - Running between buildings -->
    <a-entity position="-20 0.8 -5" 
      animation="property: position; from: -20 0.8 -5; to: 5 0.8 -5; dur: 4500; easing: linear; loop: true; delay: 1000;">
      <!-- Head -->
      <a-sphere position="0 0.5 0" radius="0.25" color="#FDBCB4"></a-sphere>
      <!-- Body -->
      <a-cylinder position="0 0 0" radius="0.18" height="0.6" color="#32CD32"></a-cylinder>
      <!-- Left arm (animated running) -->
      <a-cylinder position="-0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 -45; to: 0 0 45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Right arm (animated running) -->
      <a-cylinder position="0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 45; to: 0 0 -45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Left leg -->
      <a-cylinder position="-0.15 -0.45 0" radius="0.1" height="0.6" color="#1C1C1C"></a-cylinder>
      <!-- Right leg -->
      <a-cylinder position="0.15 -0.45 0" radius="0.1" height="0.6" color="#1C1C1C"></a-cylinder>
    </a-entity>

    <!-- Person 4 - Running from Building 1 -->
    <a-entity position="-35 0.8 -10" 
      animation="property: position; from: -35 0.8 -10; to: -5 0.8 -10; dur: 3500; easing: linear; loop: true; delay: 300;">
      <!-- Head -->
      <a-sphere position="0 0.5 0" radius="0.25" color="#FDBCB4"></a-sphere>
      <!-- Body -->
      <a-cylinder position="0 0 0" radius="0.18" height="0.6" color="#FF8C00"></a-cylinder>
      <!-- Left arm (animated running) -->
      <a-cylinder position="-0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 45; to: 0 0 -45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Right arm (animated running) -->
      <a-cylinder position="0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 -45; to: 0 0 45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Left leg -->
      <a-cylinder position="-0.15 -0.45 0" radius="0.1" height="0.6" color="#36454F"></a-cylinder>
      <!-- Right leg -->
      <a-cylinder position="0.15 -0.45 0" radius="0.1" height="0.6" color="#36454F"></a-cylinder>
    </a-entity>

    <!-- Fires on building -->
    <a-cylinder position="-26 6 -9.5" radius="0.6" height="1.5" color="#FF4500" opacity="0.8"></a-cylinder>
    <a-cylinder position="-22 9 -9.5" radius="0.6" height="1.5" color="#FF4500" opacity="0.8"></a-cylinder>

    <!-- ==================== BUILDING 2 - RESIDENTIAL (DAMAGED) ==================== -->

    <!-- Main structure -->
    <a-box position="10 10 -5" width="12" height="20" depth="10" color="#A0826D"></a-box>

    <!-- Windows on Building 2 -->
    <!-- Floor 1 -->
    <a-box position="4 2 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="8 2 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="12 2 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="16 2 -5" width="0.8" height="1.2" depth="0.2" color="#FF6347"></a-box> <!-- Broken -->

    <!-- Floor 2 -->
    <a-box position="4 5 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="8 5 -5" width="0.8" height="1.2" depth="0.2" color="#FF6347"></a-box> <!-- Broken -->
    <a-box position="12 5 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="16 5 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>

    <!-- Floor 3 -->
    <a-box position="4 8 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="8 8 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="12 8 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="16 8 -5" width="0.8" height="1.2" depth="0.2" color="#FF4500"></a-box> <!-- Fire -->

    <!-- Floor 4 -->
    <a-box position="4 11 -5" width="0.8" height="1.2" depth="0.2" color="#FF4500"></a-box> <!-- Fire -->
    <a-box position="8 11 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="12 11 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>
    <a-box position="16 11 -5" width="0.8" height="1.2" depth="0.2" color="#0a0a1a"></a-box>

    <!-- Person 5 - Running from Building 2 area -->
    <a-entity position="0 0.8 5" 
      animation="property: position; from: 0 0.8 5; to: 25 0.8 5; dur: 4800; easing: linear; loop: true; delay: 800;">
      <!-- Head -->
      <a-sphere position="0 0.5 0" radius="0.25" color="#FDBCB4"></a-sphere>
      <!-- Body -->
      <a-cylinder position="0 0 0" radius="0.18" height="0.6" color="#DC143C"></a-cylinder>
      <!-- Left arm (animated running) -->
      <a-cylinder position="-0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 -45; to: 0 0 45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Right arm (animated running) -->
      <a-cylinder position="0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 45; to: 0 0 -45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Left leg -->
      <a-cylinder position="-0.15 -0.45 0" radius="0.1" height="0.6" color="#404040"></a-cylinder>
      <!-- Right leg -->
      <a-cylinder position="0.15 -0.45 0" radius="0.1" height="0.6" color="#404040"></a-cylinder>
    </a-entity>
    <a-text value="HELP!" position="0 1.8 5" align="center" color="red" font="mozillavr" width="1" height="0.3" anchor="center" animation="property: position; from: 0 1.8 5; to: 25 1.8 5; dur: 4800; easing: linear; loop: true; delay: 800;"></a-text>

    <!-- Person 6 - Running toward rescue island -->
    <a-entity position="8 0.8 15" 
      animation="property: position; from: 8 0.8 15; to: 8 0.8 30; dur: 5000; easing: linear; loop: true; delay: 200;">
      <!-- Head -->
      <a-sphere position="0 0.5 0" radius="0.25" color="#FDBCB4"></a-sphere>
      <!-- Body -->
      <a-cylinder position="0 0 0" radius="0.18" height="0.6" color="#FF1493"></a-cylinder>
      <!-- Left arm (animated running) -->
      <a-cylinder position="-0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 45; to: 0 0 -45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Right arm (animated running) -->
      <a-cylinder position="0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 -45; to: 0 0 45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Left leg -->
      <a-cylinder position="-0.15 -0.45 0" radius="0.1" height="0.6" color="#2F4F4F"></a-cylinder>
      <!-- Right leg -->
      <a-cylinder position="0.15 -0.45 0" radius="0.1" height="0.6" color="#2F4F4F"></a-cylinder>
    </a-entity>

    <!-- Person 7 - Running across disaster zone -->
    <a-entity position="20 0.8 -15" 
      animation="property: position; from: 20 0.8 -15; to: -10 0.8 -15; dur: 5500; easing: linear; loop: true; delay: 1200;">
      <!-- Head -->
      <a-sphere position="0 0.5 0" radius="0.25" color="#FDBCB4"></a-sphere>
      <!-- Body -->
      <a-cylinder position="0 0 0" radius="0.18" height="0.6" color="#00CED1"></a-cylinder>
      <!-- Left arm (animated running) -->
      <a-cylinder position="-0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 -45; to: 0 0 45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Right arm (animated running) -->
      <a-cylinder position="0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 45; to: 0 0 -45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Left leg -->
      <a-cylinder position="-0.15 -0.45 0" radius="0.1" height="0.6" color="#1A1A1A"></a-cylinder>
      <!-- Right leg -->
      <a-cylinder position="0.15 -0.45 0" radius="0.1" height="0.6" color="#1A1A1A"></a-cylinder>
    </a-entity>

    <!-- Person 8 - Running near flooded water -->
    <a-entity position="-8 0.8 0" 
      animation="property: position; from: -8 0.8 0; to: 15 0.8 0; dur: 4200; easing: linear; loop: true; delay: 600;">
      <!-- Head -->
      <a-sphere position="0 0.5 0" radius="0.25" color="#FDBCB4"></a-sphere>
      <!-- Body -->
      <a-cylinder position="0 0 0" radius="0.18" height="0.6" color="#228B22"></a-cylinder>
      <!-- Left arm (animated running) -->
      <a-cylinder position="-0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 45; to: 0 0 -45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Right arm (animated running) -->
      <a-cylinder position="0.25 0.1 0" radius="0.08" height="0.5" color="#FDBCB4" animation="property: rotation; from: 0 0 -45; to: 0 0 45; dur: 600; easing: linear; loop: true;"></a-cylinder>
      <!-- Left leg -->
      <a-cylinder position="-0.15 -0.45 0" radius="0.1" height="0.6" color="#3C3C3C"></a-cylinder>
      <!-- Right leg -->
      <a-cylinder position="0.15 -0.45 0" radius="0.1" height="0.6" color="#3C3C3C"></a-cylinder>
    </a-entity>
    <a-text value="HELP!" position="-8 1.8 0" align="center" color="red" font="mozillavr" width="1" height="0.3" anchor="center" animation="property: position; from: -8 1.8 0; to: 15 1.8 0; dur: 4200; easing: linear; loop: true; delay: 600;"></a-text>

    <!-- Fires on Building 2 -->
    <a-cylinder position="16 9 -4" radius="0.7" height="2" color="#FF4500" opacity="0.8"></a-cylinder>
    <a-cylinder position="4 12 -4" radius="0.6" height="1.8" color="#FF4500" opacity="0.8"></a-cylinder>

    <!-- ==================== BROKEN TREES (Environmental Detail) ==================== -->
    
    <!-- Tree Group 1 - Snapped trees next to Building 1 -->
    <!-- Broken tree 1 (fallen) -->
    <a-cylinder position="-35 1 -20" radius="0.4" height="8" color="#8B4513" rotation="0 0 75"></a-cylinder>
    <!-- Tree foliage (broken) -->
    <a-sphere position="-32 2 -20" radius="1.2" color="#228B22"></a-sphere>
    <a-sphere position="-30 1.5 -20" radius="1" color="#32CD32"></a-sphere>

    <!-- Broken tree 2 -->
    <a-cylinder position="-28 0.5 -25" radius="0.35" height="7" color="#8B4513" rotation="0 0 -60"></a-cylinder>
    <a-sphere position="-25 1.8 -25" radius="1.1" color="#228B22"></a-sphere>

    <!-- Broken tree 3 (upright, snapped top) -->
    <a-cylinder position="-40 2 -15" radius="0.3" height="6" color="#8B4513"></a-cylinder>
    <a-sphere position="-40 3.5 -15" radius="0.9" color="#32CD32"></a-sphere>
    <a-sphere position="-40 4.2 -13" radius="0.7" color="#228B22"></a-sphere>

    <!-- Tree Group 2 - Between buildings -->
    <!-- Broken tree 4 -->
    <a-cylinder position="-5 1.2 -12" radius="0.4" height="8" color="#8B4513" rotation="0 0 45"></a-cylinder>
    <a-sphere position="-1 2.5 -12" radius="1.2" color="#228B22"></a-sphere>

    <!-- Broken tree 5 -->
    <a-cylinder position="5 0.8 -8" radius="0.35" height="7.5" color="#8B4513" rotation="0 0 -50"></a-cylinder>
    <a-sphere position="8 2 -8" radius="1.1" color="#32CD32"></a-sphere>

    <!-- Broken tree 6 -->
    <a-cylinder position="-2 1.5 0" radius="0.38" height="7" color="#8B4513" rotation="0 0 65"></a-cylinder>
    <a-sphere position="2 2.8 0" radius="1" color="#228B22"></a-sphere>

    <!-- Tree Group 3 - Near Building 2 -->
    <!-- Broken tree 7 -->
    <a-cylinder position="30 1 -15" radius="0.42" height="8.5" color="#8B4513" rotation="0 0 -70"></a-cylinder>
    <a-sphere position="33 2 -15" radius="1.3" color="#228B22"></a-sphere>
    <a-sphere position="35 1.5 -15" radius="0.95" color="#32CD32"></a-sphere>

    <!-- Broken tree 8 -->
    <a-cylinder position="25 1.3 5" radius="0.35" height="7" color="#8B4513" rotation="0 0 55"></a-cylinder>
    <a-sphere position="22 2.5 5" radius="1.1" color="#228B22"></a-sphere>

    <!-- Tree Group 4 - Flooded area -->
    <!-- Broken tree 9 (partially submerged) -->
    <a-cylinder position="-15 0.3 -25" radius="0.3" height="5" color="#8B4513" rotation="0 0 80"></a-cylinder>
    <a-sphere position="-12 1.2 -25" radius="0.9" color="#32CD32"></a-sphere>

    <!-- Broken tree 10 -->
    <a-cylinder position="10 0.4 -20" radius="0.32" height="5.5" color="#8B4513" rotation="0 0 -65"></a-cylinder>
    <a-sphere position="13 1.3 -20" radius="1" color="#228B22"></a-sphere>

    <!-- ==================== ENVIRONMENTAL ELEMENTS ==================== -->
    
    <!-- STANDING TREES (Realistic Forest Environment) -->
    <!-- Tree Group A (Left Forest) -->
    <!-- Tree A1 - Realistic multi-layer conifer -->
    <a-cylinder position="-45 2 -40" radius="0.6" height="12" color="#654321"></a-cylinder>
    <a-cone position="-45 10 -40" radius="3.5" height="5" color="#1B4D2E"></a-cone>
    <a-cone position="-45 13 -40" radius="2.5" height="4" color="#0F3D1F"></a-cone>
    <a-cone position="-45 15 -40" radius="1.5" height="3" color="#1B4D2E"></a-cone>
    
    <!-- Tree A2 - Realistic deciduous tree -->
    <a-cylinder position="-40 2.5 -42" radius="0.55" height="11" color="#654321"></a-cylinder>
    <a-sphere position="-40 9.5 -42" radius="4" color="#2D5016"></a-sphere>
    <a-sphere position="-43 8 -42" radius="3.2" color="#228B22"></a-sphere>
    <a-sphere position="-37 8 -42" radius="3.2" color="#2D5016"></a-sphere>
    <a-sphere position="-40 12 -42" radius="3" color="#228B22"></a-sphere>
    
    <!-- Tree A3 - Tall conifer -->
    <a-cylinder position="-50 2 -35" radius="0.7" height="14" color="#654321"></a-cylinder>
    <a-cone position="-50 11 -35" radius="4" height="6" color="#0F3D1F"></a-cone>
    <a-cone position="-50 14.5 -35" radius="2.8" height="4.5" color="#1B4D2E"></a-cone>
    <a-cone position="-50 17 -35" radius="1.8" height="3" color="#0F3D1F"></a-cone>

    <!-- Tree Group B (Right Forest) -->
    <!-- Tree B1 - Large deciduous -->
