<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Spacecraft Cockpit</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>
  <a-scene>
    <!-- Lighting -->
    <a-light type="ambient" color="#00FFFF" intensity="0.5"></a-light>
    <a-light type="point" color="#00FF00" intensity="0.8" position="0 2.5 0"></a-light>
    <a-light type="point" color="#0099FF" intensity="0.6" position="-4 2 0"></a-light>

    <!-- Floor -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="8" height="8" color="#1a1a2e"></a-plane>

    <!-- Walls -->
    <!-- Back wall -->
    <a-plane position="0 2.5 -4" width="8" height="5" color="#16213e"></a-plane>
    <!-- Left wall -->
    <a-plane position="-4 2.5 0" rotation="0 90 0" width="8" height="5" color="#0f3460"></a-plane>
    <!-- Right wall -->
    <a-plane position="4 2.5 0" rotation="0 -90 0" width="8" height="5" color="#0f3460"></a-plane>

    <!-- Ceiling -->
    <a-plane position="0 5 0" rotation="90 0 0" width="8" height="8" color="#0a0e27"></a-plane>

    <!-- Control Panel - Left -->
    <a-box position="-3 1.5 -3.8" width="1.5" height="2" depth="0.2" color="#00FF00"></a-box>
    
    <!-- Control Panel - Right -->
    <a-box position="3 1.5 -3.8" width="1.5" height="2" depth="0.2" color="#0099FF"></a-box>

    <!-- Center Console -->
    <a-box position="0 0.8 -2" width="3" height="0.8" depth="1" color="#1a1a3e"></a-box>

    <!-- Displays on back wall -->
    <!-- Left display -->
    <a-box position="-2 3.5 -3.9" width="1.2" height="1.2" depth="0.1" color="#00FF00"></a-box>
    <!-- Center display -->
    <a-box position="0 3.5 -3.9" width="1.2" height="1.2" depth="0.1" color="#FF0099"></a-box>
    <!-- Right display -->
    <a-box position="2 3.5 -3.9" width="1.2" height="1.2" depth="0.1" color="#0099FF"></a-box>

    <!-- Pilot seat back -->
    <a-box position="0 1.2 1" width="0.8" height="1.5" depth="0.3" color="#333333"></a-box>
    <!-- Seat cushion -->
    <a-cylinder position="0 0.5 0.8" radius="0.5" height="0.5" color="#444444"></a-cylinder>

    <!-- Heading indicator -->
    <a-cylinder position="0.8 1.5 -3" radius="0.3" height="0.1" color="#FFff00"></a-cylinder>
    <!-- Altitude indicator -->
    <a-cylinder position="-0.8 1.5 -3" radius="0.3" height="0.1" color="#FF00FF"></a-cylinder>

    <!-- Welcome text -->
    <a-text value="COCKPIT INITIALIZED" position="0 4.5 -3.8" align="center" color="#00FF00" font="mozillavr"
      width="4" height="1" anchor="center">
    </a-text>

    <!-- Status text -->
    <a-text value="Ready for launch" position="0 0.5 -3.8" align="center" color="#0099FF" font="mozillavr"
      width="3" height="0.8" anchor="center">
    </a-text>

  </a-scene>
</body>

</html>
